<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PORTFOLIO</title>

    <link
      href="https://webfontworld.github.io/gmarket/GmarketSans.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style2.css" />
  </head>
  <body>
    <!-- <canvas id="webgl-canvas"></canvas> -->
    <div id="wrap">
      <section id="section1">
        <h1>
          PO<span class="o1"></span>RTFO<span class="o2"></span>LIO<span
            class="o3"
          ></span>
        </h1>
        <p>프론트를 위해 달리는 개발자 포트폴리오</p>
        <div class="goBtn">
          고고
          <div class="btnDeco btnDeco1">
            <div></div>
            <div></div>
          </div>
          <div class="btnDeco btnDeco2">
            <div></div>
            <div></div>
          </div>
          <div class="btnDeco btnDeco3">
            <div></div>
            <div></div>
          </div>
          <div class="btnDeco btnDeco4">
            <div></div>
            <div></div>
          </div>
          <div class="btnDeco btnDeco5">
            <div></div>
            <div></div>
          </div>
          <div class="btnDeco btnDeco6">
            <div></div>
            <div></div>
          </div>
          <div class="btnDeco btnDeco7">
            <div></div>
            <div></div>
          </div>
          <div class="btnDeco btnDeco8">
            <div></div>
            <div></div>
          </div>
          <div class="btnDeco btnDeco9">
            <div></div>
            <div></div>
          </div>
        </div>
      </section>

      <section id="section2">
        <div class="box box1">
          <h3>SITE</h3>
          <div class="ball ball1"></div>
          <div class="ball ball2"></div>
        </div>
        <div class="box box2">
          <h3>SCRIPT</h3>
          <div class="ball ball3"></div>
        </div>

        <div class="octo"></div>
      </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r122/three.min.js"></script>
    <script src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/16327/gsap-latest-beta.min.js"></script>
    <!-- <script src="js/bgEffect.js"></script> -->
    <script src="js/mainAnimation.js"></script>
    <script>
      document.querySelector(".box1").addEventListener("click", () => {
        gsap.to(".octo", {
          duration: 0.5,
          opacity: 0,
        });
        gsap.set(".ball", {
          animationName: "",
        });
        gsap.to(".ball1", {
          duration: 0.7,
          delay: 0.7,
          scale: 3,
          opacity: 0,
          x: "-15vw",
          y: "-40vh",
          ease: "back.in(1.2)",
        });
        gsap.to(".ball2", {
          duration: 0.7,
          delay: 0.9,
          scale: 3,
          opacity: 0,
          x: "-25vw",
          y: "25vh",
          ease: "back.in(1.2)",
        });
        gsap.to(".ball3", {
          duration: 0.7,
          delay: 0.5,
          scale: 3,
          opacity: 0,
          x: "15vw",
          y: "20vh",
          ease: "back.in(1.2)",
        });
        gsap.to(".box2 h3", {
          duration: 0.5,
          delay: 1.1,
          scale: 0.3,
          x: "150vw",
          y: "-50%",
          ease: "back.in(2)",
        });
        gsap.to(".box2", {
          duration: 0.1,
          delay: 1.7,
          scale: 0.001,
          ease: "back.in(2)",
        });
        gsap.to(".box1", {
          duration: 0.8,
          delay: 2,
          scale: 5,
          opacity: 0,
        });
        gsap.to("#wrap", {
          duration: 0.5,
          delay: 2.4,
          background: "#E3FE78",
        });
        setTimeout(() => {
          location.href = "site/index.html";
        }, 2800);
      });
    </script>
  </body>
</html>
